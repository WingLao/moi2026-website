<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="520" rx="28" fill="#F8FBFF"/>
  <rect x="36" y="36" width="888" height="448" rx="24" fill="white" stroke="#D9E0EE" stroke-width="2"/>
  <text x="72" y="96" fill="#172033" font-size="34" font-family="Avenir Next, Noto Sans TC, sans-serif" font-weight="700">Josephus 環形報數示意</text>
  <text x="72" y="136" fill="#536076" font-size="20" font-family="Avenir Next, Noto Sans TC, sans-serif">例：n = 7, k = 3。每數到第 3 個人就出圈，接著從下一個人重新開始。</text>
  <circle cx="480" cy="286" r="150" fill="#F9FBFF" stroke="#D9E0EE" stroke-width="2"/>
  <g font-family="Avenir Next, Noto Sans TC, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
    <circle cx="480" cy="120" r="34" fill="#EEF3FB" stroke="#7C8DB5" stroke-width="2"/>
    <text x="480" y="128" fill="#172033">1</text>
    <circle cx="610" cy="170" r="34" fill="#EEF3FB" stroke="#7C8DB5" stroke-width="2"/>
    <text x="610" y="178" fill="#172033">2</text>
    <circle cx="660" cy="286" r="34" fill="#FEE4E2" stroke="#B42318" stroke-width="3"/>
    <text x="660" y="294" fill="#B42318">3</text>
    <circle cx="610" cy="402" r="34" fill="#EEF3FB" stroke="#7C8DB5" stroke-width="2"/>
    <text x="610" y="410" fill="#172033">4</text>
    <circle cx="480" cy="452" r="34" fill="#EEF3FB" stroke="#7C8DB5" stroke-width="2"/>
    <text x="480" y="460" fill="#172033">5</text>
    <circle cx="350" cy="402" r="34" fill="#EEF3FB" stroke="#7C8DB5" stroke-width="2"/>
    <text x="350" y="410" fill="#172033">6</text>
    <circle cx="300" cy="286" r="34" fill="#EEF3FB" stroke="#7C8DB5" stroke-width="2"/>
    <text x="300" y="294" fill="#172033">7</text>
  </g>
  <path d="M480 154C548 152 592 160 628 192" stroke="#2155D6" stroke-width="5" stroke-linecap="round"/>
  <path d="M628 192L616 176" stroke="#2155D6" stroke-width="5" stroke-linecap="round"/>
  <path d="M628 192L608 194" stroke="#2155D6" stroke-width="5" stroke-linecap="round"/>
  <text x="492" y="198" fill="#2155D6" font-size="22" font-family="Avenir Next, Noto Sans TC, sans-serif" font-weight="700">1 → 2 → 3</text>
  <text x="682" y="286" fill="#B42318" font-size="24" font-family="Avenir Next, Noto Sans TC, sans-serif" font-weight="700">第 3 個出圈</text>
  <text x="690" y="320" fill="#536076" font-size="20" font-family="Avenir Next, Noto Sans TC, sans-serif">之後從 4 繼續數</text>
  <text x="104" y="430" fill="#067647" font-size="24" font-family="Avenir Next, Noto Sans TC, sans-serif" font-weight="700">最後存活者：4</text>
  <text x="104" y="464" fill="#536076" font-size="20" font-family="Avenir Next, Noto Sans TC, sans-serif">完整出圈順序：3, 6, 2, 7, 5, 1, 4</text>
</svg>
